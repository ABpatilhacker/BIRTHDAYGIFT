<!DOCTYPE html>
<html>
<head>
<title>For Ishu 💕</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(to bottom,#14001f,#000);
font-family:sans-serif;
color:white;
text-align:center;
overflow:hidden;
}

.container{
animation:fadeIn 2s ease-in-out;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

h1{
font-size:28px;
text-shadow:0 0 20px #ff66cc;
}

p{
opacity:0.8;
}

button{
padding:14px 30px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff0080,#ff66cc);
color:white;
font-size:16px;
margin-top:30px;
cursor:pointer;
box-shadow:0 0 20px #ff66cc;
}
</style>
</head>

<body>

<div class="container">
<h1>Hey Ishu 💕</h1>
<p>I made something special for you...</p>
<button onclick="nextPage()">Tap Gently ✨</button>
</div>

<script>
function nextPage(){
window.location.href="unlock.html";
}
</script>

</body>
</html>
