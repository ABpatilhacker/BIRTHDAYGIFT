<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Ishu 💕</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:radial-gradient(circle at top,#1b0024,#000);
font-family:sans-serif;
color:white;
text-align:center;
overflow-x:hidden;
}

/* stars */
.star{
position:fixed;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}
@keyframes twinkle{
from{opacity:0.3;}
to{opacity:1;}
}

h1{
margin-top:40px;
text-shadow:0 0 25px #ff66cc;
}

.slideshow img{
width:80%;
max-width:320px;
border-radius:20px;
box-shadow:0 0 20px #ff66cc;
margin-top:20px;
cursor:pointer;
}

.heart{
position:fixed;
color:#ff66cc;
animation:explode 1.5s linear forwards;
}

@keyframes explode{
from{transform:translate(0,0);opacity:1;}
to{transform:translate(var(--x),var(--y));opacity:0;}
}

</style>
</head>

<body>

<h1>Happy Birthday Ishu 💕🎂</h1>
<p>You are my safest place, my happiest moment, my forever favorite person ✨</p>

<div class="slideshow">
<img id="slide" src="photo1.jpg" onclick="explodeHearts(event)">
</div>

<audio id="music" autoplay loop>
<source src="guzarish.mp3" type="audio/mpeg">
</audio>

<script>

/* play music immediately when page loads */
window.onload=function(){
document.getElementById("music").play().catch(()=>{});
};

/* stars */
for(let i=0;i<100;i++){
let star=document.createElement("div");
star.className="star";
star.style.top=Math.random()*100+"vh";
star.style.left=Math.random()*100+"vw";
document.body.appendChild(star);
}

/* slideshow */
let images=["photo1.jpg","photo2.jpg","photo3.jpg"];
let i=0;
setInterval(()=>{
i=(i+1)%images.length;
document.getElementById("slide").src=images[i];
},3000);

/* heart explosion */
function explodeHearts(e){
for(let j=0;j<25;j++){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=e.clientX+"px";
heart.style.top=e.clientY+"px";
heart.style.setProperty("--x",(Math.random()*300-150)+"px");
heart.style.setProperty("--y",(Math.random()*300-150)+"px");
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),1500);
}
}

</script>

</body>
</html>
